name: Publish Flutter package to pub.dev

# IMPORTANT: this workflow must be triggered by a git TAG PUSH.
#
# Unlike the PyPI/npm publish jobs (which hang off `release: published`),
# pub.dev hard-requires a tag-triggered workflow:
#
#   "Pub.dev only allows automated publishing from GitHub Actions when the
#    workflow is triggered by pushing a git tag to GitHub. Pub.dev rejects
#    publishing from GitHub Actions triggered without a tag."
#   — https://dart.dev/tools/pub/automated-publishing
#
# The tag must match the pattern configured on pub.dev (`v{{version}}`) and the
# `version:` in flutter/pubspec.yaml. `workflow_dispatch` is therefore only ever
# a dry-run rehearsal — pub.dev would reject a real publish from it.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

# Default for every job: read-only. The OIDC token is granted ONLY to the
# `publish` job below, so the build jobs (which run third-party actions and
# `cargo install`) never hold pub.dev publishing credentials.
permissions:
  contents: read

env:
  # Portable binaries — override target-cpu=native, rely on runtime SIMD dispatch.
  RUSTFLAGS: ""
  FRB_VERSION: "2.11.1"
  LIB: ferro_ta_flutter

jobs:
  # ---------------------------------------------------------------------------
  # Build prebuilt native libraries, one runner per OS family. Each job runs FRB
  # codegen (so the cdylib exports the bridge symbols) then cross-compiles and
  # uploads its platform's libs as an artifact for the single publish job below.
  #
  # Each job stages its output into `stage/`, laid out relative to `flutter/`,
  # and uploads that directory. This is deliberate: upload-artifact roots an
  # artifact at the least common ancestor of its path globs, so uploading the
  # build tree directly makes the artifact layout depend on how many globs a job
  # happens to pass (a single glob silently flattens the tree). Staging pins the
  # layout, so `cp -R <artifact>/. flutter/` is correct for every platform.
  # ---------------------------------------------------------------------------
  build-android-linux:
    name: Build Android + Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # These workflows never push; don't leave the token in
          # .git/config where later third-party steps could read it.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,x86_64-unknown-linux-gnu
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: FRB codegen
        run: |
          cargo install "flutter_rust_bridge_codegen@${FRB_VERSION}" --locked
          cd flutter && flutter pub get && flutter_rust_bridge_codegen generate
      - name: Build Android .so (all ABIs)
        working-directory: flutter/rust
        run: |
          cargo install cargo-ndk --locked
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 \
            -o "$GITHUB_WORKSPACE/stage/android/src/main/jniLibs" \
            build --release --features frb
      - name: Build Linux .so
        working-directory: flutter/rust
        run: |
          cargo build --release --features frb --target x86_64-unknown-linux-gnu
          mkdir -p "$GITHUB_WORKSPACE/stage/linux/lib"
          cp "target/x86_64-unknown-linux-gnu/release/lib${LIB}.so" \
             "$GITHUB_WORKSPACE/stage/linux/lib/"
      - name: Show staged tree
        run: find stage -type f | sort
      - uses: actions/upload-artifact@v4
        with:
          name: native-android-linux
          path: stage
          if-no-files-found: error

  build-apple:
    name: Build iOS + macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # These workflows never push; don't leave the token in
          # .git/config where later third-party steps could read it.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: FRB codegen
        run: |
          cargo install "flutter_rust_bridge_codegen@${FRB_VERSION}" --locked
          cd flutter && flutter pub get && flutter_rust_bridge_codegen generate
      - name: Build macOS universal .dylib
        working-directory: flutter/rust
        run: |
          cargo build --release --features frb --target aarch64-apple-darwin
          cargo build --release --features frb --target x86_64-apple-darwin
          mkdir -p "$GITHUB_WORKSPACE/stage/macos/lib"
          lipo -create \
            "target/aarch64-apple-darwin/release/lib${LIB}.dylib" \
            "target/x86_64-apple-darwin/release/lib${LIB}.dylib" \
            -output "$GITHUB_WORKSPACE/stage/macos/lib/lib${LIB}.dylib"
      - name: Build iOS xcframework (static)
        working-directory: flutter/rust
        run: |
          cargo build --release --features frb --target aarch64-apple-ios
          cargo build --release --features frb --target aarch64-apple-ios-sim
          cargo build --release --features frb --target x86_64-apple-ios
          # Fat simulator lib (arm64 + x86_64), device lib stays separate.
          mkdir -p sim
          lipo -create \
            "target/aarch64-apple-ios-sim/release/lib${LIB}.a" \
            "target/x86_64-apple-ios/release/lib${LIB}.a" \
            -output "sim/lib${LIB}.a"
          mkdir -p "$GITHUB_WORKSPACE/stage/ios"
          rm -rf "$GITHUB_WORKSPACE/stage/ios/${LIB}.xcframework"
          xcodebuild -create-xcframework \
            -library "target/aarch64-apple-ios/release/lib${LIB}.a" \
            -library "sim/lib${LIB}.a" \
            -output "$GITHUB_WORKSPACE/stage/ios/${LIB}.xcframework"
      - name: Show staged tree
        run: find stage -type f | sort
      - uses: actions/upload-artifact@v4
        with:
          name: native-apple
          path: stage
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # These workflows never push; don't leave the token in
          # .git/config where later third-party steps could read it.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: FRB codegen
        run: |
          cargo install "flutter_rust_bridge_codegen@$env:FRB_VERSION" --locked
          # `&&`, not `;` — PowerShell's `;` does not short-circuit, so a failed
          # `pub get` would still run codegen and fail confusingly later.
          cd flutter && flutter pub get && flutter_rust_bridge_codegen generate
      - name: Build Windows .dll
        working-directory: flutter/rust
        run: |
          cargo build --release --features frb --target x86_64-pc-windows-msvc
          $dest = "$env:GITHUB_WORKSPACE/stage/windows/lib"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item "target/x86_64-pc-windows-msvc/release/$env:LIB.dll" $dest
      - name: Show staged tree
        run: Get-ChildItem -Recurse -File stage | Select-Object -ExpandProperty FullName
      - uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: stage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Assemble every platform's libs into the plugin tree and publish once.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to pub.dev
    needs: [build-android-linux, build-apple, build-windows]
    runs-on: ubuntu-latest
    # OIDC token for pub.dev automated publishing (analog of PyPI trusted
    # publishing). `dart pub publish` requests the JWT itself when this is set —
    # no manual token exchange needed. Scoped to this job only.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          # These workflows never push; don't leave the token in
          # .git/config where later third-party steps could read it.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with: { channel: stable }

      - name: Regenerate Dart bindings for the package
        run: |
          cargo install "flutter_rust_bridge_codegen@${FRB_VERSION}" --locked
          cd flutter && flutter pub get && flutter_rust_bridge_codegen generate

      - name: Download all native artifacts into the plugin tree
        uses: actions/download-artifact@v4
        with:
          path: flutter-artifacts

      - name: Place native libraries
        run: |
          set -euo pipefail
          echo "Downloaded artifact trees:"; find flutter-artifacts -type f | sort
          # Each artifact is staged relative to flutter/, so this is a direct overlay.
          for a in native-android-linux native-apple native-windows; do
            cp -R "flutter-artifacts/$a/." flutter/
          done
          # Guard against an artifact flattening (see the staging note above):
          # anything landing directly in flutter/ means the layout regressed.
          if find flutter -maxdepth 1 -type f \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" -o -name "*.a" \) | grep -q .; then
            echo "ERROR: native libraries landed at the flutter/ root — artifact layout regressed." >&2
            find flutter -maxdepth 1 -type f \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" -o -name "*.a" \) >&2
            exit 1
          fi
          echo "Assembled native libs:"; find flutter/android flutter/ios flutter/macos flutter/windows flutter/linux -name "*${LIB}*" | sort
          echo "Package size:"; du -sh flutter

      # Fail loudly if any platform's library is missing, rather than shipping a
      # silently broken package (mirrors the PyPI wheel coverage gate in CI.yml).
      - name: Verify native library coverage
        run: |
          set -euo pipefail
          missing=0
          for f in \
            "flutter/android/src/main/jniLibs/arm64-v8a/lib${LIB}.so" \
            "flutter/android/src/main/jniLibs/armeabi-v7a/lib${LIB}.so" \
            "flutter/android/src/main/jniLibs/x86_64/lib${LIB}.so" \
            "flutter/ios/${LIB}.xcframework/Info.plist" \
            "flutter/macos/lib/lib${LIB}.dylib" \
            "flutter/windows/lib/${LIB}.dll" \
            "flutter/linux/lib/lib${LIB}.so" \
          ; do
            if [ ! -e "$f" ]; then echo "MISSING: $f"; missing=1; else echo "ok: $f"; fi
          done
          [ "$missing" -eq 0 ] || { echo "ERROR: native library coverage incomplete." >&2; exit 1; }

      # .pubignore (not .gitignore) governs what pub ships. Prove the native
      # libraries and generated bindings actually make it into the package.
      - name: Verify libraries are included in the published package
        working-directory: flutter
        run: |
          set -euo pipefail
          dart pub publish --dry-run 2>&1 | tee /tmp/pub-dry-run.txt || true
          # Every platform's library AND the generated Dart API must appear in
          # the file list. Two separate ignore layers can silently strip these:
          # the repo-root .gitignore (which a package .pubignore does NOT
          # override) and .pubignore's own patterns.
          for pat in \
            "jniLibs" \
            "xcframework" \
            "libferro_ta_flutter.dylib" \
            "ferro_ta_flutter.dll" \
            "frb_generated.dart" \
            "indicators.dart" \
          ; do
            if ! grep -q "$pat" /tmp/pub-dry-run.txt; then
              echo "ERROR: '$pat' is not in the package file list — check flutter/.pubignore and the repo-root .gitignore." >&2
              exit 1
            fi
            echo "ok: $pat present in package"
          done
          # The .so libraries need a count, not a substring match. Grepping for
          # "linux" is useless (linux/CMakeLists.txt is source and always ships,
          # so it matches even when the .so is stripped), and grepping for the
          # bare filename passes if only Android's copies survive. Exactly four
          # are expected: 3 Android ABIs + 1 Linux. The `*.so` ignore-rule class
          # of bug strips all four at once, and a Linux-only regression drops it
          # to three.
          so_count="$(grep -c 'libferro_ta_flutter\.so' /tmp/pub-dry-run.txt || true)"
          if [ "$so_count" -ne 4 ]; then
            echo "ERROR: expected 4 libferro_ta_flutter.so entries (3 Android ABIs + Linux), found ${so_count}." >&2
            echo "Check flutter/.pubignore and the repo-root .gitignore for patterns matching *.so." >&2
            exit 1
          fi
          echo "ok: all 4 .so libraries present (3 Android ABIs + Linux)"

      # `dart pub publish` (not `flutter pub publish`) is the command pub.dev's
      # automated-publishing flow documents, and the one that performs the OIDC
      # exchange. The Flutter SDK is still required to resolve the `sdk: flutter`
      # dependency, which is why flutter-action runs above.
      - name: Publish to pub.dev (tag push only)
        if: github.event_name == 'push'
        working-directory: flutter
        run: |
          flutter pub get
          dart pub publish --force

      # pub.dev rejects automated publishing that is not tag-triggered, so a
      # manual dispatch can only ever validate the package, never publish it.
      #
      # `--dry-run` exits non-zero on *any* warning, and this package always
      # emits exactly one: pub advises a loose `^` constraint on
      # flutter_rust_bridge. That advice is wrong here — flutter_rust_bridge
      # throws at RustLib.init() when the Dart runtime version differs from the
      # codegen version that produced the bindings (entrypoint.dart,
      # _sanityCheckCodegenVersion, forceSameCodegenVersion defaults to true).
      # The shipped native libraries are built against an exact FRB version, so
      # the exact pin is required for correctness. Accept that one warning and
      # fail on anything else, rather than ignoring warnings wholesale.
      - name: Dry-run only (manual dispatch)
        if: github.event_name != 'push'
        working-directory: flutter
        run: |
          flutter pub get
          set +e
          dart pub publish --dry-run 2>&1 | tee /tmp/dry-run.txt
          set -e
          unexpected="$(grep -E '^\* ' /tmp/dry-run.txt | grep -v 'flutter_rust_bridge' || true)"
          if [ -n "$unexpected" ]; then
            echo "ERROR: unexpected package warnings:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
          grep -q 'flutter_rust_bridge' /tmp/dry-run.txt \
            && echo "OK: only the expected flutter_rust_bridge pin warning (intentional)." \
            || echo "OK: no warnings."
