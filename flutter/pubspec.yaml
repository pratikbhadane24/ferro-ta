name: ferro_ta
description: >-
  Fast technical-analysis indicators for Flutter — 130+ Rust-powered functions
  (moving averages, RSI, MACD, Bollinger Bands, ATR, candlestick patterns and
  more) via flutter_rust_bridge, with prebuilt native binaries for all platforms.
version: 1.2.0
repository: https://github.com/pratikbhadane/ferro-ta
homepage: https://github.com/pratikbhadane/ferro-ta
issue_tracker: https://github.com/pratikbhadane/ferro-ta/issues
topics:
  - technical-analysis
  - finance
  - indicators
  - trading
  - ffi

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Pinned EXACTLY, on purpose — do not relax to `^2.11.1`.
  #
  # flutter_rust_bridge throws at RustLib.init() when the Dart runtime version
  # differs from the codegen version that generated the bindings (see
  # _sanityCheckCodegenVersion in the package's entrypoint.dart;
  # forceSameCodegenVersion defaults to true). The native libraries bundled here
  # are compiled against this exact version, so a caret range would let pub
  # resolve a newer 2.x and break every consumer at startup.
  #
  # `dart pub publish` warns about this constraint. The warning is expected and
  # is deliberately tolerated by flutter-publish.yml. Bump this in lockstep with
  # flutter/rust/Cargo.toml and FRB_VERSION in the workflows.
  flutter_rust_bridge: 2.11.1
  # Web reuses the already-published WASM binding via JS interop.
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffi: ^2.1.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      linux:
        ffiPlugin: true
