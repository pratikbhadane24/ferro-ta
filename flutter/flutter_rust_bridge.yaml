# flutter_rust_bridge codegen configuration.
# Run: flutter_rust_bridge_codegen generate  (or `make flutter-gen`)
#
# Scans the plain-Rust `pub fn` wrappers in `crate::api` (generated by
# scripts/build_flutter_bridge.py) and emits:
#   - rust/src/frb_generated.rs   (compiled under the `frb` cargo feature)
#   - lib/src/rust/**             (Dart bindings)
rust_input: crate::api
rust_root: rust/
dart_output: lib/src/rust
# Enable the `frb` feature so the generated glue is included when building the
# native library for distribution.
default_dart_async: true
