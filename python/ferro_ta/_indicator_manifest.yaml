    defaults: { timeperiod: 10 }
  ROC:
    rust_fn: roc
    array_params: [close]
    timeperiod_param: timeperiod
    defaults: { timeperiod: 10 }
  ROCP:
    rust_fn: rocp
    array_params: [close]
    timeperiod_param: timeperiod
    defaults: { timeperiod: 10 }
  ROCR:
    rust_fn: rocr
    array_params: [close]
    timeperiod_param: timeperiod
    defaults: { timeperiod: 10 }
  ROCR100:
    rust_fn: rocr100
    array_params: [close]
    timeperiod_param: timeperiod
    defaults: { timeperiod: 10 }
  WILLR:
    rust_fn: willr
    array_params: [high, low, close]
    timeperiod_param: timeperiod
    equal_length_groups: [[high, low, close]]
    defaults: { timeperiod: 14 }
  AROON:
    rust_fn: aroon
    array_params: [high, low]
    timeperiod_param: timeperiod
    equal_length_groups: [[high, low]]
    defaults: { timeperiod: 14 }
  AROONOSC:
    rust_fn: aroonosc
    array_params: [high, low]
