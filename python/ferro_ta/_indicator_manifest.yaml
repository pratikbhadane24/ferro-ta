    equal_length_groups: [[high, low]]
    defaults: { timeperiod: 14 }
  PLUS_DI:
    rust_fn: plus_di
    array_params: [high, low, close]
    timeperiod_param: timeperiod
    equal_length_groups: [[high, low, close]]
    defaults: { timeperiod: 14 }
  MINUS_DI:
    rust_fn: minus_di
    array_params: [high, low, close]
